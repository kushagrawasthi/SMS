            <div id="header">
                <img src="assets/social loom logo.png">

                    </div>
                </div>

                <div class="control-section">
                    <h3>Background & Frames</h3>
                    <div id="template-controls">
                        <div class="sub-section" id="background-image-controls">
                            <div class="sub-section-header">
                                <h4>Background Image</h4>
                                <label class="toggle">
                                    <input id="bg-image-checkbox" type="checkbox" />
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div id="bg-file-input-target"></div>
                            <label>
                                Horizontal Position
                                <input id="bg-image-offset-x" type="range"></input></label>
                            <label>
                                Vertical Position
                                <input id="bg-image-offset-y" type="range"></input></label>
                            <label>
                                Zoom
                                <input id="bg-image-zoom" step="0.01" type="range" min="1" value="1"
                                    max="2"></input></label>
                            <div class="sub-section-header">
                                <h5>Image Overlay</h5>
                                <label class="toggle">
                                    <input id="bg-image-overlay-checkbox" type="checkbox" disabled="true" />
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>


                        <div class="sub-section">
                            <div class="sub-section-header">
                                <h4>Frame</h4>
                                <label class="toggle">
                                    <input id="frame-checkbox" type="checkbox" />
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div id="frame-options">
                                <label>Frame Type
                                    <select id="frame-type-input">
                                        <option value="0">Simple</option>
                                        <option value="1">Thick</option>
                                        <option value="2">Dashed</option>
                                        <option value="3">Corner</option>
                                        <option value="4">Tabs</option>
                                        <option value="5">Thread</option>
                                    </select>
                                </label>
                                <label>Cornices
                                    <select id="cornices-type-input">
                                        <option>None</option>
                                        <option>Line</option>
                                        <option>Triangle</option>
                                        <option>Square</option>
                                        <option>Corner</option>
                                        <option>Trapezoid</option>
                                    </select>
                                </label>
                            </div>
                        </div>

                    </div>
                </div>

                <div class="control-section">
                    <h3>Typography</h3>
                    <div id="text-controls"></div>
                </div>

                <div id="save-controls" class="control-section">
                    <h3>Export</h3>
                    <p>Export Name:</p>
                    <input type="text" id="export-name" value="Post" pattern="[A-Za-z0-9]+"
                        title="Only letters and numbers allowed, no spaces"> </input>
                    <button id="save-button">Save File</button>
                </div>
